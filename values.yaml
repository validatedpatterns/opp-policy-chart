---
# DR pair cluster names - same structure as rdr chart (regionalDR).
# Override via values-hub or overrides so opp-policy and rdr use the same names.
regionalDR:
  - name: resilient
    clusters:
      primary:
        name: ocp-primary
      secondary:
        name: ocp-secondary

# Managed clustergroup namespace for ArgoCD wedged check is derived from (in order):
#   1. argocdHealthMonitor.managedClusterGroupNamespace (explicit override)
#   2. clusterGroup.managedClusterGroups[0].name from the Validated Patterns clusterGroup chart (values-hub)
#   3. managedClusterGroups[0].name (top-level, e.g. from values-hub)
#   4. managedClusterGroupName (override)
#   5. regionalDR[0].name (this chart, e.g. "resilient") → ramendr-starter-kit-<name>
# When used with the framework, values-hub defines managedClusterGroups; this chart uses that block and does not hard-code the name.

argocdHealthMonitor:
  enabled: true
  # Explicit override for managed clustergroup namespace (optional). When set, used as-is.
  # managedClusterGroupNamespace: ""
  forceSyncAppNamespace: openshift-gitops
  # forceSyncAppName and FORCE_SYNC_RESOURCE_NAME are calculated the same way as managed clustergroup namespace
  # (clusterGroup.managedClusterGroups[0].name, managedClusterGroups[0].name, etc.) via opp.forceSyncAppName in _helpers.tpl.
  forceSyncResourceKind: Namespace
