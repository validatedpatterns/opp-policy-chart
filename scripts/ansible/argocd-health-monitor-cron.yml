---
# ArgoCD health monitor - CronJob (runs every 15 min). Check and remediate wedged clusters.
# Requires: kubernetes.core. Run from Helm CronJob; env set by chart (MANAGED_CLUSTER_GROUP_*, FORCE_SYNC_*).
- name: ArgoCD health monitoring (CronJob)
  hosts: localhost
  gather_facts: true
  vars:
    primary_cluster: "{{ lookup('env', 'PRIMARY_CLUSTER') | default('ocp-primary', true) }}"
    secondary_cluster: "{{ lookup('env', 'SECONDARY_CLUSTER') | default('ocp-secondary', true) }}"
    managed_cluster_group_namespace: "{{ lookup('env', 'MANAGED_CLUSTER_GROUP_NAMESPACE') | default('', true) }}"
    managed_cluster_group_name: "{{ lookup('env', 'MANAGED_CLUSTER_GROUP_NAME') | default('', true) }}"
    cluster_argocd_namespace: "{{ managed_cluster_group_namespace }}"
    cluster_argocd_instance: "{{ managed_cluster_group_name }}-gitops-server"
    force_sync_app_namespace: "{{ lookup('env', 'FORCE_SYNC_APP_NAMESPACE') | default('openshift-gitops', true) }}"
    force_sync_app_name: "{{ lookup('env', 'FORCE_SYNC_APP_NAME') | default(managed_cluster_group_namespace, true) }}"
    force_sync_resource_kind: "{{ lookup('env', 'FORCE_SYNC_RESOURCE_KIND') | default('Namespace', true) }}"
    force_sync_resource_name: "{{ lookup('env', 'FORCE_SYNC_RESOURCE_NAME') | default(managed_cluster_group_namespace, true) }}"
    argocd_namespace: "openshift-gitops"
    max_attempts: 270
    sleep_interval: 20
  tasks:
    - name: Require managed clustergroup env vars (set by Helm chart)
      ansible.builtin.assert:
        that:
          - managed_cluster_group_namespace | length > 0
          - managed_cluster_group_name | length > 0
        fail_msg: "MANAGED_CLUSTER_GROUP_NAMESPACE and MANAGED_CLUSTER_GROUP_NAME must be set (by the chart or environment)."

    - name: Set hub kubeconfig path when running outside cluster
      ansible.builtin.set_fact:
        kubeconfig: "{{ lookup('env', 'KUBECONFIG') | default('', true) | trim }}"

    - name: Kubernetes API access (in-cluster SA when KUBECONFIG unset)
      environment: "{{ {'KUBECONFIG': kubeconfig} if kubeconfig | length > 0 else {} }}"
      block:
        - name: Get managed clusters (hub)
          kubernetes.core.k8s_info:
            api_version: cluster.open-cluster-management.io/v1
            kind: ManagedCluster
          register: managed_clusters_result

        - name: Set expected clusters (exclude local-cluster, sorted for deterministic order)
          ansible.builtin.set_fact:
            expected_clusters: >-
              {{
                managed_clusters_result.resources
                | default([])
                | map(attribute='metadata.name')
                | reject('equalto', 'local-cluster')
                | list
                | sort
              }}

        - name: Fail when no managed clusters
          ansible.builtin.fail:
            msg: "No managed clusters found - health monitor cannot function."
          when: expected_clusters | length == 0

        - name: Run one health check and remediate
          ansible.builtin.include_tasks: tasks/argocd-health-check-one-attempt.yml
          vars:
            attempt: 1
            max_attempts: 1

        - name: Get gitops server pod on wedged cluster
          kubernetes.core.k8s_info:
            kind: Pod
            namespace: "{{ argocd_namespace }}"
            kubeconfig: "/tmp/{{ item }}-kubeconfig.yaml"
            label_selectors:
              - "app.kubernetes.io/name=openshift-gitops-server"
          register: server_pod_result
          loop: "{{ wedged_clusters | default([]) }}"
          loop_control:
            label: "{{ item }}"
          when: wedged_clusters | default([]) | length > 0
          failed_when: false

        - name: Trigger ArgoCD app refresh on wedged cluster
          ansible.builtin.shell: |
            set -e -o pipefail
            if [ -n "{{ pod_name }}" ]; then
              oc --kubeconfig="{{ kubeconfig_path }}" exec \
                -n {{ argocd_namespace }} "{{ pod_name }}" -- \
                argocd app list --server localhost:8080 -o name | while read app; do
                [ -z "$app" ] || oc --kubeconfig="{{ kubeconfig_path }}" exec \
                  -n {{ argocd_namespace }} "{{ pod_name }}" -- \
                  argocd app get "$app" --server localhost:8080 --refresh || true
              done
              oc --kubeconfig="{{ kubeconfig_path }}" exec \
                -n {{ argocd_namespace }} "{{ pod_name }}" -- \
                argocd app list --server localhost:8080 -o name | while read app; do
                [ -z "$app" ] || oc --kubeconfig="{{ kubeconfig_path }}" exec \
                  -n {{ argocd_namespace }} "{{ pod_name }}" -- \
                  argocd app get "$app" --server localhost:8080 --hard-refresh || true
              done
            fi
          args:
            executable: /bin/bash
          loop: "{{ server_pod_result.results | default([]) }}"
          when: wedged_clusters | default([]) | length > 0 and (item.resources | default([]) | length > 0)
          loop_control:
            label: "{{ item.item }}"
          vars:
            kubeconfig_path: "/tmp/{{ item.item }}-kubeconfig.yaml"
            pod_name: "{{ item.resources[0].metadata.name if (item.resources | default([]) | length > 0) else '' }}"
          changed_when: false
          failed_when: false

        - name: Success
          ansible.builtin.debug:
            msg: "ArgoCD health monitoring completed."
