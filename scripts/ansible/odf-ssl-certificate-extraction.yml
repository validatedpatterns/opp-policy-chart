---
# ODF SSL certificate extraction and distribution.
# Requires: kubernetes.core. Env: PRIMARY_CLUSTER, SECONDARY_CLUSTER. Optional KUBECONFIG when not in-cluster.
# Do not set empty KUBECONFIG on the play — it breaks hub API access in the Job pod (use SA token).
# Run: ansible-playbook -i localhost, -c local odf-ssl-certificate-extraction.yml
- name: ODF SSL certificate extraction
  hosts: localhost
  gather_facts: true
  vars:
    work_dir: "/tmp/odf-ssl-certs"
    primary_cluster: "{{ lookup('env', 'PRIMARY_CLUSTER') | default('ocp-primary', true) }}"
    secondary_cluster: "{{ lookup('env', 'SECONDARY_CLUSTER') | default('ocp-secondary', true) }}"
    required_clusters: ["hub", "{{ primary_cluster }}", "{{ secondary_cluster }}"]
    kubeconfig: "{{ lookup('env', 'KUBECONFIG') | default('', true) | trim }}"
  tasks:
    - name: Log job context (cluster names, paths, auth hint)
      ansible.builtin.debug:
        msg:
          - "ODF SSL extraction starting"
          - "work_dir={{ work_dir }}"
          - "primary_cluster={{ primary_cluster }} secondary_cluster={{ secondary_cluster }}"
          - "KUBECONFIG_from_env={{ 'set' if (kubeconfig | length) > 0 else 'unset (in-cluster SA token expected)' }}"
          - "managed_cluster_kubeconfigs_expected_under={{ work_dir }}/<cluster>-kubeconfig.yaml"

    - name: Create work directory
      ansible.builtin.file:
        path: "{{ work_dir }}"
        state: directory
        mode: "0755"

    - name: Extract hub CA (current context)
      ansible.builtin.include_tasks: tasks/odf-ssl-extract-ca.yml
      vars:
        cluster_name: hub
        output_path: "{{ work_dir }}/hub-ca.crt"
        kubeconfig_path: ""

    - name: Get ingress CA from hub (router-ca secret)
      block:
        - name: Get hub ingress CA secret
          kubernetes.core.k8s_info:
            kind: Secret
            name: router-ca
            namespace: openshift-ingress-operator
          register: router_ca
        - name: Write hub ingress CA certificate
          ansible.builtin.copy:
            content: "{{ (router_ca.resources[0].data.get('tls.crt') or router_ca.resources[0].data.get('ca.crt', '')) | b64decode }}"
            dest: "{{ work_dir }}/hub-ingress-ca.crt"
            mode: "0644"
          when: router_ca.resources | length > 0 and (router_ca.resources[0].data | length > 0)
      rescue:
        - name: Report missing hub ingress CA secret
          ansible.builtin.debug:
            msg: "Hub ingress CA not available, continuing without it"

    - name: Get managed clusters
      kubernetes.core.k8s_info:
        api_version: cluster.open-cluster-management.io/v1
        kind: ManagedCluster
      register: managed_clusters_result

    - name: Set managed clusters list (exclude local-cluster)
      ansible.builtin.set_fact:
        _mc_names: >-
          {{
            managed_clusters_result.resources | default([])
            | map(attribute='metadata.name')
            | reject('equalto', 'local-cluster')
            | list
          }}

    - name: Require PRIMARY_CLUSTER and SECONDARY_CLUSTER to match hub ManagedCluster names
      ansible.builtin.fail:
        msg: >-
          PRIMARY_CLUSTER={{ primary_cluster }} and SECONDARY_CLUSTER={{ secondary_cluster }} must each match an ACM
          ManagedCluster on this hub (excl. local-cluster). Discovered: {{ _mc_names | join(', ') | default('none', true) }}.
          Set Helm regionalDR (or env) so names match metadata.name — do not use placeholders like ocp-primary if clusters are named differently.
      when: >-
        (primary_cluster not in _mc_names)
        or (secondary_cluster not in _mc_names)

    - name: Set managed clusters list (hub discovery only — avoids bogus kubeconfig namespaces)
      ansible.builtin.set_fact:
        managed_clusters: "{{ _mc_names | sort }}"

    - name: Download kubeconfig for managed cluster
      ansible.builtin.include_tasks: tasks/kubeconfig-attempt.yml
      loop: "{{ managed_clusters }}"
      loop_control:
        label: "{{ item }}"
      vars:
        cluster: "{{ item }}"
        kubeconfig_path: "{{ work_dir }}/{{ item }}-kubeconfig.yaml"
        check_available: false

    - name: Fail if kubeconfig could not be written for PRIMARY or SECONDARY
      ansible.builtin.fail:
        msg: >-
          Missing {{ work_dir }}/{{ item }}-kubeconfig.yaml (needed for CA extract and cluster-proxy distribution).
          kubeconfig_failures={{ kubeconfig_failures | default([]) }}.
          Fix hub RBAC, cluster import, or secret name (admin-kubeconfig / kubeconfig) in namespace {{ item }}.
      loop: "{{ [primary_cluster, secondary_cluster] }}"
      when: (work_dir + '/' + item + '-kubeconfig.yaml') is not file

    - name: Extract CA from managed cluster
      ansible.builtin.include_tasks: tasks/odf-ssl-extract-ca.yml
      loop: "{{ managed_clusters }}"
      loop_control:
        label: "{{ item }}"
      vars:
        cluster_name: "{{ item }}"
        output_path: "{{ work_dir }}/{{ item }}-ca.crt"
        kubeconfig_path: "{{ work_dir }}/{{ item }}-kubeconfig.yaml"
      when: (work_dir + '/' + item + '-kubeconfig.yaml') is file

    - name: Get ingress CA from managed cluster
      block:
        - name: Get managed cluster ingress CA secret
          kubernetes.core.k8s_info:
            kind: Secret
            name: router-ca
            namespace: openshift-ingress-operator
            kubeconfig: "{{ work_dir }}/{{ item }}-kubeconfig.yaml"
          register: router_ca_mc
          loop: "{{ managed_clusters }}"
          when: (work_dir + '/' + item + '-kubeconfig.yaml') is file
          loop_control:
            label: "{{ item }}"
          failed_when: false
        - name: Write managed cluster ingress CA certificate
          ansible.builtin.copy:
            content: "{{ (item.resources[0].data.get('tls.crt') or item.resources[0].data.get('ca.crt', '')) | b64decode }}"
            dest: "{{ work_dir }}/{{ item.item }}-ingress-ca.crt"
            mode: "0644"
          loop: "{{ router_ca_mc.results | default([]) }}"
          when: item.resources | length > 0 and (item.resources[0].data | length > 0)
          failed_when: false
    - name: Find CA files in work dir
      ansible.builtin.find:
        paths: "{{ work_dir }}"
        patterns: "*.crt"
      register: ca_files_found

    # Each path must be a separate shell word; join+quote made one bogus path and produced an empty bundle.
    - name: Create combined CA bundle (first 5 certs per file)
      ansible.builtin.shell: |
        set -e
        out="{{ work_dir }}/combined-ca-bundle.crt"
        : > "$out"
        for f in \
        {% for p in ca_files_found.files %}
        {% if loop.last %}
        {{ p.path | quote }}
        {% else %}
        {{ p.path | quote }} \
        {% endif %}
        {% endfor %}
        do
          [ -s "$f" ] || continue
          echo "# CA from $(basename "$f" .crt)" >> "$out"
          cert_count=0
          in_cert=false
          while IFS= read -r line; do
            if [ "$line" = "-----BEGIN CERTIFICATE-----" ]; then in_cert=true; cert_count=$((cert_count+1)); [ $cert_count -le 5 ] || break; fi
            [ "$in_cert" = true ] && echo "$line" >> "$out"
            if [ "$line" = "-----END CERTIFICATE-----" ]; then in_cert=false; echo "" >> "$out"; fi
          done < "$f"
        done
      args:
        executable: /bin/bash
      when: ca_files_found.matched | default(0) > 0
      changed_when: false

    - name: Stat combined CA bundle
      ansible.builtin.stat:
        path: "{{ work_dir }}/combined-ca-bundle.crt"
      register: combined_ca_stat
      when: ca_files_found.matched | default(0) > 0

    - name: Fail when combined CA bundle is empty or missing
      ansible.builtin.fail:
        msg: >-
          combined-ca-bundle.crt is missing or too small ({{ combined_ca_stat.stat.size | default(0) }} bytes).
          CA .crt files were found but the merge script produced no output — check paths and permissions.
      when: >-
        ca_files_found.matched | default(0) | int > 0
        and (combined_ca_stat.stat.size | default(0) | int) < 64

    - name: Validate required clusters have CA
      ansible.builtin.fail:
        msg: >-
          CA material: need PEM files under {{ work_dir }} from hub + PRIMARY + SECONDARY (Helm regionalDR names must match ACM ManagedCluster names).
          hub-ca.crt={{ 'present' if (work_dir + '/hub-ca.crt') is file else 'MISSING' }},
          {{ primary_cluster }}-ca.crt={{ 'present' if (work_dir + '/' + primary_cluster + '-ca.crt') is file else 'MISSING' }},
          {{ secondary_cluster }}-ca.crt={{ 'present' if (work_dir + '/' + secondary_cluster + '-ca.crt') is file else 'MISSING' }}.
          If a spoke file is MISSING: check kubeconfig was saved as {{ work_dir }}/<cluster>-kubeconfig.yaml,
          and that ConfigMap trusted-ca-bundle exists in openshift-config-managed on that cluster (kubernetes.core k8s_info errors appear earlier).
      when: (work_dir + '/hub-ca.crt') is not file or (work_dir + '/' + primary_cluster + '-ca.crt') is not file or (work_dir + '/' + secondary_cluster +
        '-ca.crt') is not file

    - name: Get cluster-proxy-ca-bundle for merge
      kubernetes.core.k8s_info:
        kind: ConfigMap
        name: cluster-proxy-ca-bundle
        namespace: openshift-config
      register: cluster_proxy_cm_get
      failed_when: false

    - name: Create cluster-proxy-ca-bundle ConfigMap
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: cluster-proxy-ca-bundle
            namespace: openshift-config
          data:
            ca-bundle.crt: "{{ lookup('file', work_dir + '/combined-ca-bundle.crt') }}"
      when: cluster_proxy_cm_get.resources | length == 0

    - name: Patch cluster-proxy-ca-bundle ConfigMap
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: cluster-proxy-ca-bundle
            namespace: openshift-config
          data:
            ca-bundle.crt: "{{ lookup('file', work_dir + '/combined-ca-bundle.crt') }}"
      when: cluster_proxy_cm_get.resources | length > 0

    - name: Update hub cluster proxy trustedCA
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: config.openshift.io/v1
          kind: Proxy
          metadata:
            name: cluster
          spec:
            trustedCA:
              name: cluster-proxy-ca-bundle
      failed_when: false

    - name: Get ramenddr pods per cluster
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: openshift-dr-system
        kubeconfig: "{{ work_dir }}/{{ item }}-kubeconfig.yaml"
        label_selectors:
          - "app=ramenddr-cluster-operator"
      register: ramen_pods_per_cluster
      loop: "{{ managed_clusters }}"
      loop_control:
        label: "{{ item }}"
      when: (work_dir + '/' + item + '-kubeconfig.yaml') is file
      failed_when: false

    - name: Delete ramenddr-cluster-operator pods on managed clusters
      ansible.builtin.include_tasks: tasks/odf-ssl-delete-pods.yml
      loop: "{{ ramen_pods_per_cluster.results | default([]) }}"
      loop_control:
        loop_var: ramen_pod_query
        label: "{{ ramen_pod_query.item }}"
      when: ramen_pod_query.resources | default([]) | length > 0
      vars:
        target_cluster: "{{ ramen_pod_query.item }}"
        pods_to_delete: "{{ ramen_pod_query.resources | default([]) }}"
        pod_namespace: openshift-dr-system

    # Ramen ConfigMap: same code path as odf-ssl-certificate-extraction.sh (avoids Ansible/k8s module + huge YAML issues).
    - name: Update ramen-hub-operator-config (bash script parity)
      tags:
        - always
      block:
        - name: Run odf-ssl-ramen-hub-configmap.sh
          ansible.builtin.command: bash /playbooks/odf-ssl-ramen-hub-configmap.sh
          register: ramen_hub_cm_script
          environment:
            WORK_DIR: "{{ work_dir }}"
            PRIMARY_CLUSTER: "{{ primary_cluster }}"
            SECONDARY_CLUSTER: "{{ secondary_cluster }}"
      rescue:
        - name: Ramen hub script — full Ansible result (rc, stdout, stderr)
          ansible.builtin.debug:
            var: ramen_hub_cm_script
        - name: Ramen hub script failed
          ansible.builtin.fail:
            msg: |-
              STEP FAILED: odf-ssl-ramen-hub-configmap.sh (ramen-hub-operator-config / s3StoreProfiles CA).
              Exit code: {{ ramen_hub_cm_script.rc | default('unknown') }}
              --- STDOUT (truncated) ---
              {{ ramen_hub_cm_script.stdout | default('', true) | truncate(12000, true, '...[stdout truncated]') }}
              --- STDERR (truncated) ---
              {{ ramen_hub_cm_script.stderr | default('', true) | truncate(8000, true, '...[stderr truncated]') }}
              Hint: search pod logs for "STEP FAILED" or "odf-ssl-ramen-hub-configmap"; verify oc auth,
              yq v4, openshift-operators/ramen-hub-operator-config, and profile count vs MIN_REQUIRED_PROFILES in the script.

    - name: Get Velero pods per cluster
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: openshift-adp
        kubeconfig: "{{ work_dir }}/{{ item }}-kubeconfig.yaml"
        label_selectors:
          - "component=velero"
      register: velero_pods_per_cluster
      loop: "{{ managed_clusters }}"
      when: (work_dir + '/' + item + '-kubeconfig.yaml') is file
      loop_control:
        label: "{{ item }}"
      failed_when: false

    - name: Delete Velero pods on managed clusters
      ansible.builtin.include_tasks: tasks/odf-ssl-delete-pods.yml
      loop: "{{ velero_pods_per_cluster.results | default([]) }}"
      loop_control:
        loop_var: velero_pod_query
        label: "{{ velero_pod_query.item }}"
      when: velero_pod_query.resources | default([]) | length > 0
      vars:
        target_cluster: "{{ velero_pod_query.item }}"
        pods_to_delete: "{{ velero_pod_query.resources | default([]) }}"
        pod_namespace: openshift-adp

    - name: Distribute CA bundle to managed cluster
      block:
        - name: Create cluster-proxy-ca-bundle on managed cluster
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: cluster-proxy-ca-bundle
                namespace: openshift-config
              data:
                ca-bundle.crt: "{{ lookup('file', work_dir + '/combined-ca-bundle.crt') }}"
            kubeconfig: "{{ work_dir }}/{{ item }}-kubeconfig.yaml"
          loop: "{{ managed_clusters }}"
          when: (work_dir + '/' + item + '-kubeconfig.yaml') is file
          loop_control:
            label: "{{ item }}"
          register: mc_proxy_cm_create
          failed_when: false

        - name: Patch proxy on managed cluster
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: config.openshift.io/v1
              kind: Proxy
              metadata:
                name: cluster
              spec:
                trustedCA:
                  name: cluster-proxy-ca-bundle
            kubeconfig: "{{ work_dir }}/{{ item }}-kubeconfig.yaml"
          loop: "{{ managed_clusters }}"
          when: (work_dir + '/' + item + '-kubeconfig.yaml') is file
          loop_control:
            label: "{{ item }}"
          register: mc_proxy_trusted_ca_patch
          failed_when: false

        - name: Collect cluster-proxy-ca-bundle apply failures
          ansible.builtin.set_fact:
            _mc_cm_apply_errors: >-
              {{
                (_mc_cm_apply_errors | default([]))
                + [ (item.item | string) ~ ': ' ~ (item.msg | default('unknown error')) ]
              }}
          loop: "{{ mc_proxy_cm_create.results | default([]) }}"
          when: not item.skipped | default(false) and item.failed | default(false)

        - name: Collect managed-cluster Proxy patch failures
          ansible.builtin.set_fact:
            _mc_proxy_patch_errors: >-
              {{
                (_mc_proxy_patch_errors | default([]))
                + [ (item.item | string) ~ ': ' ~ (item.msg | default('unknown error')) ]
              }}
          loop: "{{ mc_proxy_trusted_ca_patch.results | default([]) }}"
          when: not item.skipped | default(false) and item.failed | default(false)

        - name: Fail when cluster-proxy-ca-bundle could not be applied on a managed cluster
          ansible.builtin.fail:
            msg: >-
              Create/patch failed on one or more clusters (API rejected the task; was previously hidden by failed_when:false).
              ConfigMap errors: {{ _mc_cm_apply_errors | default([]) }}.
              Proxy patch errors: {{ _mc_proxy_patch_errors | default([]) }}.
              Typical causes: invalid kubeconfig, RBAC on the spoke, or network to the spoke API.
          when: >-
            (_mc_cm_apply_errors | default([]) | length) > 0
            or (_mc_proxy_patch_errors | default([]) | length) > 0

        - name: Re-read cluster-proxy-ca-bundle on each managed cluster (verify distribution)
          kubernetes.core.k8s_info:
            kind: ConfigMap
            name: cluster-proxy-ca-bundle
            namespace: openshift-config
            kubeconfig: "{{ work_dir }}/{{ item }}-kubeconfig.yaml"
          loop: "{{ managed_clusters }}"
          when: (work_dir + '/' + item + '-kubeconfig.yaml') is file
          loop_control:
            label: "{{ item }}"
          register: mc_bundle_after_apply
          failed_when: false

        - name: Fail when spoke still has no cluster-proxy-ca-bundle after apply
          ansible.builtin.fail:
            msg: >-
              CA config ({{ item.item }}):
              {{ ('API error reading openshift-config — ' ~ (item.msg | default('unknown'))) if (item.failed | default(false)) else 'ConfigMap cluster-proxy-ca-bundle not found in openshift-config.' }}
              If apply succeeded moments ago, check spoke RBAC and policies that remove this ConfigMap.
          loop: "{{ mc_bundle_after_apply.results | default([]) }}"
          when: >-
            not item.skipped | default(false)
            and (
              item.failed | default(false)
              or (item.resources | default([]) | length) == 0
            )

        - name: Fail when spoke bundle data is empty (0 chars)
          ansible.builtin.fail:
            msg: >-
              CA material: {{ 'primary' if (item.item == primary_cluster) else ('secondary' if (item.item == secondary_cluster) else 'cluster') }}
              ({{ item.item }}) bundle missing or too small
              ({{ ((item.resources[0].data | default({})).get('ca-bundle.crt', '') | length) }} chars).
              Expect non-empty ca-bundle.crt after hub merge; if hub bundle is valid, check for a policy on the spoke
              that reconciles cluster-proxy-ca-bundle back to an empty placeholder.
          loop: "{{ mc_bundle_after_apply.results | default([]) }}"
          when: >-
            not item.skipped | default(false)
            and (item.resources | default([]) | length) > 0
            and (((item.resources[0].data | default({})).get('ca-bundle.crt', '') | length) | int) < 64

    - name: ODF SSL certificate extraction completed
      ansible.builtin.debug:
        msg: "ODF SSL certificate management completed successfully."
