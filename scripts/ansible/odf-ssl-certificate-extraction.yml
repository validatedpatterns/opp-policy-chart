---
# ODF SSL certificate extraction and distribution.
# Requires: kubernetes.core. Env: PRIMARY_CLUSTER, SECONDARY_CLUSTER. Optional KUBECONFIG when not in-cluster.
# Do not set empty KUBECONFIG on the play — it breaks hub API access in the Job pod (use SA token).
# Run: ansible-playbook -i localhost, -c local odf-ssl-certificate-extraction.yml
- name: ODF SSL certificate extraction
  hosts: localhost
  gather_facts: true
  vars:
    work_dir: "/tmp/odf-ssl-certs"
    primary_cluster: "{{ lookup('env', 'PRIMARY_CLUSTER') | default('ocp-primary', true) }}"
    secondary_cluster: "{{ lookup('env', 'SECONDARY_CLUSTER') | default('ocp-secondary', true) }}"
    required_clusters: ["hub", "{{ primary_cluster }}", "{{ secondary_cluster }}"]
    kubeconfig: "{{ lookup('env', 'KUBECONFIG') | default('', true) | trim }}"
  tasks:
    - name: Create work directory
      ansible.builtin.file:
        path: "{{ work_dir }}"
        state: directory
        mode: "0755"

    - name: Extract hub CA (current context)
      ansible.builtin.include_tasks: tasks/odf-ssl-extract-ca.yml
      vars:
        cluster_name: hub
        output_path: "{{ work_dir }}/hub-ca.crt"
        kubeconfig_path: ""

    - name: Get ingress CA from hub (router-ca secret)
      block:
        - name: Get hub ingress CA secret
          kubernetes.core.k8s_info:
            kind: Secret
            name: router-ca
            namespace: openshift-ingress-operator
          register: router_ca
        - name: Write hub ingress CA certificate
          ansible.builtin.copy:
            content: "{{ (router_ca.resources[0].data.get('tls.crt') or router_ca.resources[0].data.get('ca.crt', '')) | b64decode }}"
            dest: "{{ work_dir }}/hub-ingress-ca.crt"
            mode: "0644"
          when: router_ca.resources | length > 0 and (router_ca.resources[0].data | length > 0)
      rescue:
        - name: Report missing hub ingress CA secret
          ansible.builtin.debug:
            msg: "Hub ingress CA not available, continuing without it"

    - name: Get managed clusters
      kubernetes.core.k8s_info:
        api_version: cluster.open-cluster-management.io/v1
        kind: ManagedCluster
      register: managed_clusters_result

    - name: Set managed clusters list (exclude local-cluster)
      ansible.builtin.set_fact:
        _mc_names: >-
          {{
            managed_clusters_result.resources | default([])
            | map(attribute='metadata.name')
            | reject('equalto', 'local-cluster')
            | list
          }}

    - name: Merge hub discovery with PRIMARY_CLUSTER and SECONDARY_CLUSTER
      ansible.builtin.set_fact:
        managed_clusters: "{{ (_mc_names + [primary_cluster, secondary_cluster]) | unique | sort }}"

    - name: Download kubeconfig for managed cluster
      ansible.builtin.include_tasks: tasks/kubeconfig-attempt.yml
      loop: "{{ managed_clusters }}"
      loop_control:
        label: "{{ item }}"
      vars:
        cluster: "{{ item }}"
        kubeconfig_path: "{{ work_dir }}/{{ item }}-kubeconfig.yaml"
        check_available: false

    - name: Extract CA from managed cluster
      ansible.builtin.include_tasks: tasks/odf-ssl-extract-ca.yml
      loop: "{{ managed_clusters }}"
      loop_control:
        label: "{{ item }}"
      vars:
        cluster_name: "{{ item }}"
        output_path: "{{ work_dir }}/{{ item }}-ca.crt"
        kubeconfig_path: "{{ work_dir }}/{{ item }}-kubeconfig.yaml"
      when: (work_dir + '/' + item + '-kubeconfig.yaml') is file

    - name: Get ingress CA from managed cluster
      block:
        - name: Get managed cluster ingress CA secret
          kubernetes.core.k8s_info:
            kind: Secret
            name: router-ca
            namespace: openshift-ingress-operator
            kubeconfig: "{{ work_dir }}/{{ item }}-kubeconfig.yaml"
          register: router_ca_mc
          loop: "{{ managed_clusters }}"
          when: (work_dir + '/' + item + '-kubeconfig.yaml') is file
          loop_control:
            label: "{{ item }}"
          failed_when: false
        - name: Write managed cluster ingress CA certificate
          ansible.builtin.copy:
            content: "{{ (item.resources[0].data.get('tls.crt') or item.resources[0].data.get('ca.crt', '')) | b64decode }}"
            dest: "{{ work_dir }}/{{ item.item }}-ingress-ca.crt"
            mode: "0644"
          loop: "{{ router_ca_mc.results | default([]) }}"
          when: item.resources | length > 0 and (item.resources[0].data | length > 0)
          failed_when: false
    - name: Find CA files in work dir
      ansible.builtin.find:
        paths: "{{ work_dir }}"
        patterns: "*.crt"
      register: ca_files_found

    # Each path must be a separate shell word; join+quote made one bogus path and produced an empty bundle.
    - name: Create combined CA bundle (first 5 certs per file)
      ansible.builtin.shell: |
        set -e
        out="{{ work_dir }}/combined-ca-bundle.crt"
        : > "$out"
        for f in \
        {% for p in ca_files_found.files %}
        {% if loop.last %}
        {{ p.path | quote }}
        {% else %}
        {{ p.path | quote }} \
        {% endif %}
        {% endfor %}
        do
          [ -s "$f" ] || continue
          echo "# CA from $(basename "$f" .crt)" >> "$out"
          cert_count=0
          in_cert=false
          while IFS= read -r line; do
            if [ "$line" = "-----BEGIN CERTIFICATE-----" ]; then in_cert=true; cert_count=$((cert_count+1)); [ $cert_count -le 5 ] || break; fi
            [ "$in_cert" = true ] && echo "$line" >> "$out"
            if [ "$line" = "-----END CERTIFICATE-----" ]; then in_cert=false; echo "" >> "$out"; fi
          done < "$f"
        done
      args:
        executable: /bin/bash
      when: ca_files_found.matched | default(0) > 0
      changed_when: false

    - name: Stat combined CA bundle
      ansible.builtin.stat:
        path: "{{ work_dir }}/combined-ca-bundle.crt"
      register: combined_ca_stat
      when: ca_files_found.matched | default(0) > 0

    - name: Fail when combined CA bundle is empty or missing
      ansible.builtin.fail:
        msg: >-
          combined-ca-bundle.crt is missing or too small ({{ combined_ca_stat.stat.size | default(0) }} bytes).
          CA .crt files were found but the merge script produced no output — check paths and permissions.
      when: >-
        ca_files_found.matched | default(0) | int > 0
        and (combined_ca_stat.stat.size | default(0) | int) < 64

    - name: Validate required clusters have CA
      ansible.builtin.fail:
        msg: "CA material missing from required clusters (hub, {{ primary_cluster }}, {{ secondary_cluster }})."
      when: (work_dir + '/hub-ca.crt') is not file or (work_dir + '/' + primary_cluster + '-ca.crt') is not file or (work_dir + '/' + secondary_cluster +
        '-ca.crt') is not file

    - name: Get cluster-proxy-ca-bundle for merge
      kubernetes.core.k8s_info:
        kind: ConfigMap
        name: cluster-proxy-ca-bundle
        namespace: openshift-config
      register: cluster_proxy_cm_get
      failed_when: false

    - name: Create cluster-proxy-ca-bundle ConfigMap
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: cluster-proxy-ca-bundle
            namespace: openshift-config
          data:
            ca-bundle.crt: "{{ lookup('file', work_dir + '/combined-ca-bundle.crt') }}"
      when: cluster_proxy_cm_get.resources | length == 0

    - name: Patch cluster-proxy-ca-bundle ConfigMap
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: cluster-proxy-ca-bundle
            namespace: openshift-config
          data:
            ca-bundle.crt: "{{ lookup('file', work_dir + '/combined-ca-bundle.crt') }}"
      when: cluster_proxy_cm_get.resources | length > 0

    - name: Update hub cluster proxy trustedCA
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: config.openshift.io/v1
          kind: Proxy
          metadata:
            name: cluster
          spec:
            trustedCA:
              name: cluster-proxy-ca-bundle
      failed_when: false

    - name: Get ramenddr pods per cluster
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: openshift-dr-system
        kubeconfig: "{{ work_dir }}/{{ item }}-kubeconfig.yaml"
        label_selectors:
          - "app=ramenddr-cluster-operator"
      register: ramen_pods_per_cluster
      loop: "{{ managed_clusters }}"
      loop_control:
        label: "{{ item }}"
      when: (work_dir + '/' + item + '-kubeconfig.yaml') is file
      failed_when: false

    - name: Delete ramenddr-cluster-operator pods on managed clusters
      ansible.builtin.include_tasks: tasks/odf-ssl-delete-pods.yml
      loop: "{{ ramen_pods_per_cluster.results | default([]) }}"
      loop_control:
        loop_var: ramen_pod_query
        label: "{{ ramen_pod_query.item }}"
      when: ramen_pod_query.resources | default([]) | length > 0
      vars:
        target_cluster: "{{ ramen_pod_query.item }}"
        pods_to_delete: "{{ ramen_pod_query.resources | default([]) }}"
        pod_namespace: openshift-dr-system

    # Ramen ConfigMap update + verification: tagged "always" so ansible-playbook --tags does not skip them.
    # ramen_config_yaml is always a string (never undefined) so when: branches are reliable.
    - name: Encode combined CA bundle to base64
      ansible.builtin.set_fact:
        ca_bundle_b64: "{{ lookup('file', work_dir + '/combined-ca-bundle.crt') | b64encode }}"
      tags:
        - always

    - name: Get existing ramen-hub-operator-config
      kubernetes.core.k8s_info:
        kind: ConfigMap
        name: ramen-hub-operator-config
        namespace: openshift-operators
      register: ramen_config_cm
      tags:
        - always

    - name: Set ramen_config_yaml from cluster (always defined, empty if no ConfigMap or key)
      ansible.builtin.set_fact:
        ramen_config_yaml: >-
          {{
            ((ramen_config_cm.resources[0].data | default({}))['ramen_manager_config.yaml'] | default(''))
            if (ramen_config_cm.resources | default([]) | length) > 0 else ''
          }}
      tags:
        - always

    - name: Write existing ramen_manager_config for yq patch
      ansible.builtin.copy:
        content: "{{ ramen_config_yaml }}"
        dest: "{{ work_dir }}/existing-ramen-config.yaml"
        mode: "0644"
      when: (ramen_config_yaml | length) > 0
      tags:
        - always

    # When CM already exists, patch s3StoreProfiles in place (same as bash odf-ssl-certificate-extraction.sh).
    - name: Patch existing ramen_manager_config s3StoreProfiles with caCertificates (yq)
      ansible.builtin.shell: |
        set -euo pipefail
        cp "{{ work_dir }}/existing-ramen-config.yaml" "{{ work_dir }}/ramen_manager_config.yaml"
        yq eval -i '.s3StoreProfiles[]? |= . + {"caCertificates": strenv(CA_BUNDLE_BASE64)}' "{{ work_dir }}/ramen_manager_config.yaml"
        yq eval -i '.kubeObjectProtection.s3StoreProfiles[]? |= . + {"caCertificates": strenv(CA_BUNDLE_BASE64)}' "{{ work_dir }}/ramen_manager_config.yaml"
        test -s "{{ work_dir }}/ramen_manager_config.yaml"
        grep -q 'caCertificates' "{{ work_dir }}/ramen_manager_config.yaml"
      environment:
        CA_BUNDLE_BASE64: "{{ ca_bundle_b64 }}"
      args:
        executable: /bin/bash
      when: (ramen_config_yaml | length) > 0
      register: ramen_yq_patch
      changed_when: true
      tags:
        - always

    - name: Create minimal ramen_manager_config when ConfigMap missing or empty
      ansible.builtin.copy:
        content: |
          kubeObjectProtection:
            s3StoreProfiles:
            - s3ProfileName: {{ primary_cluster }}
              caCertificates: "{{ ca_bundle_b64 }}"
            - s3ProfileName: {{ secondary_cluster }}
              caCertificates: "{{ ca_bundle_b64 }}"
          s3StoreProfiles:
          - s3ProfileName: {{ primary_cluster }}
            caCertificates: "{{ ca_bundle_b64 }}"
          - s3ProfileName: {{ secondary_cluster }}
            caCertificates: "{{ ca_bundle_b64 }}"
        dest: "{{ work_dir }}/ramen_manager_config.yaml"
        mode: "0644"
      when: (ramen_config_yaml | length) == 0
      tags:
        - always

    - name: Stat ramen_manager_config.yaml before apply
      ansible.builtin.stat:
        path: "{{ work_dir }}/ramen_manager_config.yaml"
      register: ramen_mgr_stat
      tags:
        - always

    - name: Fail if ramen_manager_config.yaml was not produced
      ansible.builtin.assert:
        that:
          - ramen_mgr_stat.stat.exists | default(false)
          - (ramen_mgr_stat.stat.size | default(0) | int) > 32
        fail_msg: >-
          Internal error: ramen_manager_config.yaml missing or empty after patch/create.
          If an existing ConfigMap had no s3StoreProfiles for yq to patch, pre-create profiles in ramen-hub-operator-config
          or use the bash job which validates profile count.
      tags:
        - always

    - name: Apply ramen-hub-operator-config ConfigMap
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: ramen-hub-operator-config
            namespace: openshift-operators
          data:
            ramen_manager_config.yaml: "{{ lookup('file', work_dir + '/ramen_manager_config.yaml') }}"
      tags:
        - always

    - name: Re-read ramen-hub-operator-config after apply
      kubernetes.core.k8s_info:
        kind: ConfigMap
        name: ramen-hub-operator-config
        namespace: openshift-operators
      register: ramen_config_verify
      tags:
        - always

    - name: Assert live ConfigMap contains caCertificates in ramen_manager_config.yaml
      ansible.builtin.assert:
        that:
          - ramen_config_verify.resources | length > 0
          - >-
            ('caCertificates' in ((ramen_config_verify.resources[0].data | default({})).get('ramen_manager_config.yaml', '') | default('')))
            and (('s3StoreProfiles' in ((ramen_config_verify.resources[0].data | default({})).get('ramen_manager_config.yaml', '') | default('')))
            or ('kubeObjectProtection' in ((ramen_config_verify.resources[0].data | default({})).get('ramen_manager_config.yaml', '') | default(''))))
        fail_msg: >-
          ramen-hub-operator-config apply succeeded but cluster ConfigMap ramen_manager_config.yaml does not contain
          expected caCertificates / s3StoreProfiles (or kubeObjectProtection) content. Ramen may not have accepted the update.
      tags:
        - always

    # Runs even in check mode; fails if cluster ConfigMap lacks CA material (Ansible assert can be skipped in some modes).
    - name: Mandatory oc verification — ramen_manager_config.yaml contains caCertificates on cluster
      ansible.builtin.shell: |
        set -euo pipefail
        oc get configmap ramen-hub-operator-config -n openshift-operators \
          -o jsonpath='{.data.ramen_manager_config\.yaml}' > "{{ work_dir }}/.ramen-live-verify.yaml"
        test -s "{{ work_dir }}/.ramen-live-verify.yaml"
        grep -q 'caCertificates' "{{ work_dir }}/.ramen-live-verify.yaml"
        grep -Eq 's3StoreProfiles|kubeObjectProtection' "{{ work_dir }}/.ramen-live-verify.yaml"
      args:
        executable: /bin/bash
      changed_when: false
      check_mode: false
      tags:
        - always

    - name: Get Velero pods per cluster
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: openshift-adp
        kubeconfig: "{{ work_dir }}/{{ item }}-kubeconfig.yaml"
        label_selectors:
          - "component=velero"
      register: velero_pods_per_cluster
      loop: "{{ managed_clusters }}"
      when: (work_dir + '/' + item + '-kubeconfig.yaml') is file
      loop_control:
        label: "{{ item }}"
      failed_when: false

    - name: Delete Velero pods on managed clusters
      ansible.builtin.include_tasks: tasks/odf-ssl-delete-pods.yml
      loop: "{{ velero_pods_per_cluster.results | default([]) }}"
      loop_control:
        loop_var: velero_pod_query
        label: "{{ velero_pod_query.item }}"
      when: velero_pod_query.resources | default([]) | length > 0
      vars:
        target_cluster: "{{ velero_pod_query.item }}"
        pods_to_delete: "{{ velero_pod_query.resources | default([]) }}"
        pod_namespace: openshift-adp

    - name: Distribute CA bundle to managed cluster
      block:
        - name: Create cluster-proxy-ca-bundle on managed cluster
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: cluster-proxy-ca-bundle
                namespace: openshift-config
              data:
                ca-bundle.crt: "{{ lookup('file', work_dir + '/combined-ca-bundle.crt') }}"
            kubeconfig: "{{ work_dir }}/{{ item }}-kubeconfig.yaml"
          loop: "{{ managed_clusters }}"
          when: (work_dir + '/' + item + '-kubeconfig.yaml') is file
          loop_control:
            label: "{{ item }}"
          failed_when: false
        - name: Patch proxy on managed cluster
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: config.openshift.io/v1
              kind: Proxy
              metadata:
                name: cluster
              spec:
                trustedCA:
                  name: cluster-proxy-ca-bundle
            kubeconfig: "{{ work_dir }}/{{ item }}-kubeconfig.yaml"
          loop: "{{ managed_clusters }}"
          when: (work_dir + '/' + item + '-kubeconfig.yaml') is file
          loop_control:
            label: "{{ item }}"
          failed_when: false

    - name: ODF SSL certificate extraction completed
      ansible.builtin.debug:
        msg: "ODF SSL certificate management completed successfully."
