---
# ODF SSL certificate precheck. Ensures certificates are distributed before DR policies.
# Can trigger certificate extraction job if distribution is incomplete.
# Requires: kubernetes.core. Env: PRIMARY_CLUSTER, SECONDARY_CLUSTER.
- name: ODF SSL certificate precheck
  hosts: localhost
  gather_facts: true
  vars:
    primary_cluster: "{{ lookup('env', 'PRIMARY_CLUSTER') | default('ocp-primary', true) }}"
    secondary_cluster: "{{ lookup('env', 'SECONDARY_CLUSTER') | default('ocp-secondary', true) }}"
    min_certificates: 15
    min_bundle_size: 20000
    max_attempts: 120
    sleep_interval: 30
    cluster_readiness_max_attempts: 120
    cluster_readiness_sleep: 30
    kubeconfig: "{{ lookup('env', 'KUBECONFIG') | default('', true) }}"
  tasks:
    - name: Wait for required clusters to be available and joined
      include_tasks: tasks/get_managed_clusters.yml
      loop: "{{ range(1, cluster_readiness_max_attempts + 1) | list }}"
      loop_control:
        extended: yes
        index_var: wait_idx
        label: "{{ 'Cluster readiness ' + (wait_idx | string) }}"
      vars:
        sleep_interval: "{{ cluster_readiness_sleep }}"
        expected_cluster_count: 2
      when: not (clusters_ready | default(false))
      register: wait_clusters
      until: clusters_ready | default(false)
      retries: "{{ cluster_readiness_max_attempts }}"
      delay: "{{ cluster_readiness_sleep }}"
      ignore_errors: true

    - name: Check certificate distribution on hub
      block:
        - name: Get cluster-proxy-ca-bundle ConfigMap
          kubernetes.core.k8s_info:
            kind: ConfigMap
            name: cluster-proxy-ca-bundle
            namespace: openshift-config
          register: ca_bundle_cm

        - name: Fail when CA bundle ConfigMap not found
          fail:
            msg: "CA bundle ConfigMap not found on hub cluster."
          when: ca_bundle_cm.resources | length == 0

        - name: Set bundle content and size
          set_fact:
            bundle_content: "{{ ca_bundle_cm.resources[0].data.get('ca-bundle.crt', '') }}"
            bundle_size: "{{ (ca_bundle_cm.resources[0].data.get('ca-bundle.crt', '') | length) }}"
          when: ca_bundle_cm.resources | length > 0

        - name: Fail when CA bundle too small
          fail:
            msg: "CA bundle too small ({{ bundle_size }} < {{ min_bundle_size }} bytes)."
          when: bundle_size | default(0) < min_bundle_size

        - name: Count certificates in bundle
          set_fact:
            cert_count: "{{ bundle_content | default('') | regex_findall('-----BEGIN CERTIFICATE-----') | length }}"

        - name: Fail when too few certificates
          fail:
            msg: "Too few certificates in bundle ({{ cert_count }} < {{ min_certificates }})."
          when: cert_count | default(0) < min_certificates

        - name: Set certificate distribution complete
          set_fact:
            certificate_distribution_ok: true
      rescue:
        - name: Set certificate distribution incomplete
          set_fact:
            certificate_distribution_ok: false

    - name: Get managed clusters for cleanup
      kubernetes.core.k8s_info:
        kind: ManagedCluster
      register: mc_list
      when: certificate_distribution_ok | default(false) | bool == false

    - name: Download kubeconfig for managed cluster (for cleanup)
      include_tasks: tasks/kubeconfig.yml
      loop: "{{ (mc_list.resources | default([]) | map(attribute='metadata.name') | reject('equalto', 'local-cluster') | list) }}"
      loop_control:
        label: "{{ item }}"
      vars:
        cluster: "{{ item }}"
        kubeconfig_path: "/tmp/{{ item }}-kubeconfig.yaml"
        check_available: false
      when: certificate_distribution_ok | default(false) | bool == false and mc_list.resources is defined
      ignore_errors: true

    - name: Cleanup placeholder ConfigMaps on managed clusters
      block:
        - name: Get cluster-proxy-ca-bundle on managed cluster
          kubernetes.core.k8s_info:
            kind: ConfigMap
            name: cluster-proxy-ca-bundle
            namespace: openshift-config
            kubeconfig: "/tmp/{{ item }}-kubeconfig.yaml"
          register: mc_ca_cm
          loop: "{{ (mc_list.resources | default([]) | map(attribute='metadata.name') | reject('equalto', 'local-cluster') | list) }}"
          ignore_errors: true
        - name: Delete placeholder ConfigMap from managed cluster
          kubernetes.core.k8s:
            state: absent
            kind: ConfigMap
            name: cluster-proxy-ca-bundle
            namespace: openshift-config
            kubeconfig: "/tmp/{{ item.item }}-kubeconfig.yaml"
          loop: "{{ mc_ca_cm.results | default([]) }}"
          when: item.resources | length > 0 and ("Placeholder for ODF SSL" in (item.resources[0].data.get('ca-bundle.crt', '') or '') or "This will be populated" in (item.resources[0].data.get('ca-bundle.crt', '') or ''))
          ignore_errors: true
      when: certificate_distribution_ok | default(false) | bool == false

    - name: Trigger certificate extraction (create Job in openshift-config - handled by ArgoCD/Helm)
      debug:
        msg: "Certificate distribution incomplete. Trigger or re-sync the odf-ssl-certificate-extractor Job in openshift-config namespace, then re-run this precheck."
      when: certificate_distribution_ok | default(false) | bool == false

    - name: Re-check certificate distribution after extraction
      block:
        - name: Get cluster-proxy-ca-bundle again
          kubernetes.core.k8s_info:
            kind: ConfigMap
            name: cluster-proxy-ca-bundle
            namespace: openshift-config
          register: ca_bundle_cm2
        - name: Set certificate_distribution_ok after extraction
          set_fact:
            certificate_distribution_ok: "{{ (ca_bundle_cm2.resources[0].data.get('ca-bundle.crt', '') | length) >= min_bundle_size and (ca_bundle_cm2.resources[0].data.get('ca-bundle.crt', '') | regex_findall('-----BEGIN CERTIFICATE-----') | length) >= min_certificates }}"
          when: ca_bundle_cm2.resources | length > 0
      when: certificate_distribution_ok | default(false) | bool == false

    - name: Fail when certificate distribution still incomplete after extraction
      fail:
        msg: "Certificate distribution failed after {{ max_attempts }} attempts. Manual intervention may be required."
      when: certificate_distribution_ok | default(false) | bool == false

    - name: Precheck success
      debug:
        msg: "ODF SSL certificate precheck completed successfully. Ready for DR prerequisites check."
  environment:
    KUBECONFIG: "{{ kubeconfig | default(omit) }}"
