---
# Delete pods in a list. Vars: target_cluster, pods_to_delete, work_dir, pod_namespace.
- name: Delete listed pod
  kubernetes.core.k8s:
    state: absent
    kind: Pod
    namespace: "{{ pod_namespace }}"
    name: "{{ del_pod.metadata.name }}"
    kubeconfig: "{{ work_dir }}/{{ target_cluster }}-kubeconfig.yaml"
  loop: "{{ pods_to_delete }}"
  loop_control:
    loop_var: del_pod
    label: "{{ del_pod.metadata.name }}"
  failed_when: false
