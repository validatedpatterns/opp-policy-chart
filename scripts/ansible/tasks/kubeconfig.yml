---
# Shared tasks: retrieve kubeconfig for a managed cluster (hub context).
# Uses same method as download-kubeconfigs: secret in cluster NS, kubeconfig or raw-kubeconfig.
# Call with: cluster, kubeconfig_path (default /tmp/{{ cluster }}-kubeconfig.yaml)
# Expects: hub kubeconfig in env KUBECONFIG or in-cluster.
- name: Check managed cluster is available
  kubernetes.core.k8s_info:
    kind: ManagedCluster
    name: "{{ cluster }}"
  register: mc
  failed_when: mc.resources | length == 0
  when: check_available | default(true) | bool

- name: Get managed cluster availability status
  ansible.builtin.set_fact:
    cluster_available: >-
      {{
        (
          mc.resources[0].status.conditions
          | selectattr('type', 'equalto', 'ManagedClusterConditionAvailable')
          | map(attribute='status')
          | first
          | default('')
        ) == 'True'
      }}
  when: check_available | default(true) | bool and mc.resources | length > 0

- name: Fail when cluster is not available
  ansible.builtin.fail:
    msg: "Cluster {{ cluster }} is not available (status not True), skipping."
  when: check_available | default(true) | bool and not (cluster_available | default(false))

- name: List secrets in managed cluster namespace
  kubernetes.core.k8s_info:
    kind: Secret
    namespace: "{{ cluster }}"
  register: secrets_list

- name: Find kubeconfig secret name (admin-kubeconfig or kubeconfig)
  ansible.builtin.set_fact:
    kubeconfig_secret_name: >-
      {{
        secrets_list.resources
        | selectattr('metadata.name', 'match', '.*(admin-kubeconfig|kubeconfig).*')
        | map(attribute='metadata.name')
        | list
        | first
        | default('')
      }}
  when: secrets_list.resources is defined and secrets_list.resources | length > 0

- name: Fail when no kubeconfig secret found
  ansible.builtin.fail:
    msg: "No kubeconfig secret found for cluster {{ cluster }}"
  when: kubeconfig_secret_name is not defined or kubeconfig_secret_name == ''

- name: Get kubeconfig secret
  kubernetes.core.k8s_info:
    kind: Secret
    name: "{{ kubeconfig_secret_name }}"
    namespace: "{{ cluster }}"
  register: kubeconfig_secret

- name: Decode kubeconfig from secret (try kubeconfig then raw-kubeconfig)
  ansible.builtin.set_fact:
    kubeconfig_content: >-
      {{
        (kubeconfig_secret.resources[0].data.get('kubeconfig', '') | b64decode)
        or (kubeconfig_secret.resources[0].data.get('raw-kubeconfig', '') | b64decode)
        or ''
      }}
  when: kubeconfig_secret.resources | length > 0

- name: Fail when kubeconfig data is empty
  ansible.builtin.fail:
    msg: "Could not extract kubeconfig data for cluster {{ cluster }}"
  when: kubeconfig_content is not defined or kubeconfig_content == ''

- name: Write kubeconfig to file
  ansible.builtin.copy:
    content: "{{ kubeconfig_content }}"
    dest: "{{ kubeconfig_path | default('/tmp/' + cluster + '-kubeconfig.yaml') }}"
    mode: "0600"
  when: kubeconfig_content is defined and kubeconfig_content != ''
