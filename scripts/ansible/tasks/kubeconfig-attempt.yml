---
- name: Retrieve kubeconfig for {{ cluster }}
  block:
    - name: Include kubeconfig retrieval tasks for {{ cluster }}
      ansible.builtin.include_tasks: tasks/kubeconfig.yml
  rescue:
    - name: Record kubeconfig retrieval failure for {{ cluster }}
      ansible.builtin.set_fact:
        kubeconfig_failures: "{{ (kubeconfig_failures | default([])) + [cluster] }}"
