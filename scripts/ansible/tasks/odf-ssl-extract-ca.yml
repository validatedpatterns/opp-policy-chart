---
# Extract CA from a cluster. Vars: cluster_name, output_path, kubeconfig_path (omit for hub).
- name: Get trusted-ca-bundle ConfigMap
  kubernetes.core.k8s_info:
    kind: ConfigMap
    name: trusted-ca-bundle
    namespace: openshift-config-managed
    kubeconfig: >-
      {{
        kubeconfig_path
        if (kubeconfig_path | default('', true) | trim | length) > 0
        else omit
      }}
  register: ca_cm
  failed_when: false

- name: Set CA content from ConfigMap data
  ansible.builtin.set_fact:
    ca_content: >-
      {{
        (
          ca_cm.resources[0].data.get('ca-bundle.crt')
          or ca_cm.resources[0].data.get('ca-bundle\\.crt', '')
        ) if (ca_cm.resources | length > 0 and ca_cm.resources[0].data) else ''
      }}
  when: ca_cm.resources | length > 0

- name: Write cluster CA to file
  ansible.builtin.copy:
    content: "{{ ca_content }}"
    dest: "{{ output_path }}"
    mode: "0644"
  when: ca_content is defined and ca_content != ''

- name: Stat extracted CA output
  ansible.builtin.stat:
    path: "{{ output_path }}"
  register: odf_ssl_ca_out_stat

- name: Fail when CA file missing or too small after extract
  ansible.builtin.fail:
    msg: >-
      Extraction produced no usable PEM at {{ output_path }} (cluster={{ cluster_name | default('unknown') }}).
      Source: ConfigMap trusted-ca-bundle, namespace openshift-config-managed
      (hub: in-cluster API; spoke: kubeconfig={{ kubeconfig_path | default('(hub)') }}).
      k8s_info resource count={{ ca_cm.resources | default([]) | length }}.
  when: >-
    not odf_ssl_ca_out_stat.stat.exists | default(false)
    or (odf_ssl_ca_out_stat.stat.size | default(0) | int) < 64
