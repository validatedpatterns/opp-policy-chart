apiVersion: batch/v1
kind: Job
metadata:
  name: odf-ssl-certificate-precheck
  namespace: open-cluster-management
  labels:
    app.kubernetes.io/name: odf-ssl-certificate-management
    app.kubernetes.io/component: certificate-precheck
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: Prune=false
    argocd.argoproj.io/compare-options: IgnoreExtraneous
    argocd.argoproj.io/hook: "PostSync"
    argocd.argoproj.io/hook-delete-policy: "BeforeHookCreation"
spec:
  # Each failed Pod (e.g. OOM) counts toward backoff; lower limit avoids many dead Pods while debugging.
  backoffLimit: 5
  activeDeadlineSeconds: 7200
  template:
    spec:
      serviceAccountName: odf-ssl-certificate-precheck
      restartPolicy: Never
      containers:
      - name: odf-ssl-precheck
        image: quay.io/validatedpatterns/utility-container:latest
        workingDir: /playbooks
        # Ansible + kubernetes client; raise if OOMKilled (exit 137) during long until loops.
        resources:
          requests:
            memory: "384Mi"
            cpu: "100m"
          limits:
            memory: "768Mi"
            cpu: "500m"
        env:
        - name: PRIMARY_CLUSTER
          value: {{ include "opp.primaryClusterName" . | quote }}
        - name: SECONDARY_CLUSTER
          value: {{ include "opp.secondaryClusterName" . | quote }}
        command:
        - ansible-playbook
        args:
        - -i
        - localhost,
        - -c
        - local
        - /playbooks/odf-ssl-precheck.yml
        volumeMounts:
        - name: playbooks
          mountPath: /playbooks
          readOnly: true
      volumes:
      - name: playbooks
        configMap:
          name: odf-ssl-precheck-playbooks
          items:
          - key: odf-ssl-precheck.yml
            path: odf-ssl-precheck.yml
          - key: tasks_kubeconfig.yml
            path: tasks/kubeconfig.yml
          - key: tasks_kubeconfig_attempt.yml
            path: tasks/kubeconfig-attempt.yml
